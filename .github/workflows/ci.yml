name: ci

# Validate the harness on every push and PR: doctor (unresolved tokens, dead/
# non-hermetic links, theme-key parity, author-time spec/plugin gates, rendered-
# bundle sync) plus the stdlib unit suite and the Node test suites. Dependency-free —
# no install step. Runs on Linux AND Windows so native-Windows support stays green.
on:
  push:
  pull_request:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: doctor (every theme + parity + authoring gates)
        run: python rituals/harness.py doctor --all
      - name: unit tests
        run: python -m unittest discover -s tests -p "test_*.py"
      # Auto-discover every tests/*.test.mjs (workflow runtime + plugins) — node
      # expands the glob itself, so it's shell-agnostic (bash + pwsh) and a new test
      # file is picked up without editing this workflow. Needs Node >= 21.
      - name: node test suites (workflow runtime + plugins)
        run: node --test "tests/**/*.test.mjs"

  # The web UI (web/) is a Vite/React app with its own toolchain, so it gets a
  # dedicated job: lint, format check, unit tests, and a production build. Linux
  # only — it is platform-independent, unlike the harness CLI above.
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: lint
        run: npm run lint
      - name: format check
        run: npm run format:check
      - name: unit tests
        run: npm test
      - name: production build
        run: npm run build
